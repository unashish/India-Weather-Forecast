name: Update Weather Plot

on:
  schedule:
    # Runs twice a day at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: write # Crucial: Allows the robot to upload your new images

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libgeos-dev libproj-dev proj-bin

      - name: Install Python Libraries
        run: |
          pip install xarray matplotlib cartopy cfgrib ecmwf-opendata numpy geopandas

      - name: Run Python Script
        run: python ifs_code.py

      - name: Commit and Push Images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Automated weather plot update" || echo "No changes to commit"
          git push
