name: Update Weather Plot

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libgeos-dev libproj-dev proj-bin

      - name: Install Python Libraries
        run: |
          pip install xarray matplotlib cartopy cfgrib ecmwf-opendata numpy geopandas

      - name: Run Python Script
        run: python ifs_code.py

      - name: Commit and Push Images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          # The '|| true' prevents the error if no files changed
          git commit -m "Automated weather plot update" || true
          git push
